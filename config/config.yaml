# =============================================================================
# Glitch Reality AI — Main Configuration
# =============================================================================
# To switch to paid APIs: change provider in each section and add new secrets.
# See README.md → "Upgrading to Paid APIs" for step-by-step instructions.

channel:
  name: "Hard4Fun"
  niche: "Comedy / Absurd Humor / Brainrot / Glitches in Reality"
  language: "en"
  daily_videos: 4          # how many Shorts to produce per run (3–5)
  video_duration_min: 20   # seconds
  video_duration_max: 50   # seconds

# -----------------------------------------------------------------------------
# Video generation — hybrid strategy combines all available methods
# -----------------------------------------------------------------------------
video:
  strategy: "hybrid"       # hybrid = random mix | single = one provider + fallback
  provider: "ai_images"    # for single mode
  fallback_provider: "pexels"  # ultimate safety net (always works)
  resolution: "576x1024"    # 9:16 vertical (Wan native)
  fps: 16
  num_frames: 81            # ~5 s at 16 fps

  # Hybrid mode: weighted random selection of providers per video.
  # Higher weight = more likely to be picked first.
  hybrid_providers:
    - provider: "ai_images"    # AI-generated images + Ken Burns animation (HF credits)
      weight: 0                # ← HF free credits exhausted; re-enable when reset
    - provider: "hf_inference" # AI video generation (HF credits)
      weight: 0                # ← HF free credits exhausted; re-enable when reset
    - provider: "pexels"       # Stock footage with glitch overlay (always free)
      weight: 100

  # AI image generation — free via HF Inference (text_to_image)
  ai_images:
    models:
      - "black-forest-labs/FLUX.1-schnell"       # fast, high quality
      - "stabilityai/stable-diffusion-xl-base-1.0" # fallback
    num_images: 10          # images per video (each ~3 s = ~30s total)
    width: 576              # portrait 9:16
    height: 1024
    duration_per_image: 3.0 # seconds of Ken Burns animation per image

  # HF Inference Providers — serverless AI video via fal-ai / Replicate / etc.
  # Routed through HuggingFace using HF_TOKEN. Free monthly credits.
  hf_inference:
    timeout: 300
    provider_models:
      - provider: "replicate"
        model: "tencent/HunyuanVideo"
      - provider: "novita"
        model: "Wan-AI/Wan2.1-T2V-14B"
      - provider: "replicate"
        model: "Wan-AI/Wan2.1-T2V-14B"

  huggingface:
    spaces:
      # Each entry: {space_id, timeout}  — space_id = "owner/space-name"
      - space_id: "Wan-AI/Wan2.1-T2V-14B"
        timeout: 300
      - space_id: "THUDM/CogVideoX-5B-Space"
        timeout: 300
      - space_id: "multimodalart/wan-2.1-fast"
        timeout: 300
    retry_attempts: 1
    retry_sleep_min: 5    # seconds between retries
    retry_sleep_max: 15

  # Pexels stock footage — free, reliable fallback
  # Requires PEXELS_API_KEY secret. Clips get glitch effects in montage.
  pexels:
    orientation: "portrait"   # portrait for Shorts
    per_page: 3               # results per query

  # --- PAID UPGRADE (uncomment + set secrets when ready) ---
  # kling:
  #   provider: "kling"
  #   model: "kling-v1-5"
  #   api_key_secret: "KLING_API_KEY"
  # runway:
  #   provider: "runway"
  #   model: "gen3a_turbo"
  #   api_key_secret: "RUNWAY_API_KEY"

# -----------------------------------------------------------------------------
# Text-to-Speech
# -----------------------------------------------------------------------------
tts:
  provider: "edge-tts"      # options: edge-tts | elevenlabs | openai
  voices:
    - "en-US-GuyNeural"     # deep male — primary
    - "en-US-ChristopherNeural"
    - "en-US-EricNeural"
    - "en-US-JennyNeural"   # female fallback
  speed: "+15%"             # snappy delivery for comedy timing
  pitch: "+0Hz"

  # --- PAID UPGRADE ---
  # elevenlabs:
  #   provider: "elevenlabs"
  #   voice_id: "YOUR_VOICE_ID"
  #   model: "eleven_turbo_v2"
  #   api_key_secret: "ELEVENLABS_API_KEY"

# -----------------------------------------------------------------------------
# Montage / FFmpeg
# -----------------------------------------------------------------------------
montage:
  font: "assets/fonts/Impact.ttf"
  subtitle_style:
    fontsize: 52
    fontcolor: "white"
    highlight_color: "yellow"  # karaoke highlight for current word
    outline_color: "black"
    outline_width: 4
    position: "bottom"       # bottom of screen, above safe zone
  glitch_overlay: true       # apply RGB shift glitch effect via ffmpeg
  music_volume: 0.15         # background music relative to TTS (0.0 – 1.0)
  music_dir: "assets/music"

# -----------------------------------------------------------------------------
# YouTube upload
# -----------------------------------------------------------------------------
youtube:
  category_id: "23"          # Comedy
  privacy_status: "private"   # public | unlisted | private
  made_for_kids: false
  default_tags:
    - "shorts"
    - "hard4fun"
    - "comedy"
    - "funny"
    - "brainrot"
    - "meme"
    - "humor"
    - "glitch"
    - "simulationglitch"
    - "glitchinthematrix"
    - "realityglitch"
    - "wtf"
    - "relatable"
    - "genz"
    - "fyp"
    - "viral"
    - "aicomedy"
    - "deadpan"
    - "absurd"
    - "mindblowing"

# -----------------------------------------------------------------------------
# Prompt generation (free AI APIs for new ideas)
# -----------------------------------------------------------------------------
prompts:
  ideas_file: "prompts/ideas.json"
  daily_count: 15            # comedy ideas per run (grows pool faster than 4 consumed)
  ai_provider: "gemini"      # options: gemini | grok | openai | none
  gemini:
    model: "gemini-2.0-flash"
    api_key_secret: "GEMINI_API_KEY"

# -----------------------------------------------------------------------------
# Notifications / error reporting (optional)
# -----------------------------------------------------------------------------
notifications:
  github_issue_on_failure: true
  github_issue_label: "auto-error"
